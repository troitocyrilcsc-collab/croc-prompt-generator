<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img src="croc-2.png" class="logo">
  <p class="subtitle">Générateur intelligent de prompts</p>
</header>

<main class="card">

  <!-- CIBLE -->
  <div class="section">
    <h3>Cible</h3>
    <input id="cible" placeholder="Ex: adolescents, seniors, parents...">
  </div>

  <!-- OBJECTIF -->
  <div class="section">
    <h3>Objectif</h3>
    <input id="objectif" placeholder="Ex: organiser une activité, créer un atelier...">
  </div>

  <!-- ROLE -->
  <div class="section">
    <h3>Rôle</h3>
    <div class="choices" id="role">
      <button onclick="select(this,'role')">Animateur socioculturel</button>
      <button onclick="select(this,'role')">Coordinateur jeunesse</button>
      <button onclick="select(this,'role')">Médiateur numérique</button>
      <button onclick="select(this,'role')">Travailleur social</button>
      <button onclick="select(this,'role')">Responsable centre social</button>
      <button onclick="select(this,'role')">Animateur senior</button>
      <button onclick="select(this,'role')">Chargé de projet social</button>
    </div>
  </div>

  <!-- CADRAGE -->
  <div class="section">
    <h3>Cadrage</h3>
    <input id="contexte" placeholder="Contexte...">
    <input id="contraintes" placeholder="Contraintes...">
    
    <div class="choices" id="ton">
      <button onclick="select(this,'ton')">Professionnel</button>
      <button onclick="select(this,'ton')">Pédagogique</button>
      <button onclick="select(this,'ton')">Bienveillant</button>
      <button onclick="select(this,'ton')">Dynamique</button>
    </div>
  </div>

  <button class="generate" onclick="generer()">Générer le prompt</button>

  <textarea id="resultat"></textarea>

  <button class="copy" onclick="copier()">📋 Copier le prompt</button>

</main>

<footer>
  <h3>Partenaires</h3>
  <div class="logos">
    <img src="Logo CSAT WS App.png">
    <img src="Bandeau financeur sans CSAT sans caf.png">
    <img src="logo_acsrv_carre.png">
     <img src="AMQR_logo-vignette.png">
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
