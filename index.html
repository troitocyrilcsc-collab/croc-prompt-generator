
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CROC LE PROMPT V4</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
<div class="nav-container">
<div class="brand">
<img src="logo_croc.png" class="logo">
<h1>CROC LE PROMPT</h1>
</div>

<nav>
<ul>
<li>Accueil</li>
<li>Méthode CROC</li>
<li>Générateur</li>
</ul>
</nav>
</div>
</header>

<section class="hero">
<h2>Générateur professionnel de prompts IA</h2>
<p>Créez des prompts structurés et efficaces avec la méthode CROC.</p>
</section>

<section class="generator">

<h3>Constructeur de prompt</h3>

<label>Cadrage</label>
<select id="cadrage">
<option>atelier pédagogique en centre social</option>
<option>formation numérique</option>
<option>création de contenu web</option>
</select>

<label>Rôle</label>
<select id="role">
<option>expert pédagogique</option>
<option>formateur numérique</option>
<option>rédacteur professionnel</option>
</select>

<label>Objectif</label>
<select id="objectif">
<option>créer une activité pédagogique</option>
<option>expliquer un concept</option>
<option>générer un quiz</option>
</select>

<label>Cible</label>
<select id="cible">
<option>enfants</option>
<option>collégiens</option>
<option>adultes</option>
</select>

<label>Détails supplémentaires</label>
<textarea id="details"></textarea>

<button onclick="generate()">Générer le prompt</button>

<pre id="result"></pre>

<button onclick="copy()">Copier le prompt</button>

</section>

<footer>

<div class="footer-logos">
<img src="logo_europe.png">
<img src="logo_csat.png">
<img src="logo_acsrv.png">
</div>

<p>Projet soutenu par les partenaires institutionnels.</p>

</footer>

<script src="script.js"></script>

</body>
</html>
