<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Croc Le Prompt</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img src="croc-2.png" class="logo">
  <p class="subtitle">Générateur intelligent pour centres sociaux</p>
</header>

<main class="card">

  <!-- CIBLE -->
  <div class="section">
    <h3>Cible</h3>
    <input id="cible" placeholder="Ex : adolescents, seniors, familles...">
  </div>

    <!-- ROLE -->
  <div class="section">
    <h3>Votre rôle</h3>

    <select id="role">
      <option value="">-- Sélectionner un rôle --</option>

      <optgroup label="Encadrement et Direction">
        <option>Directeur Général</option>
        <option>Directeur Général Adjoint</option>
        <option>Directeur de Pôle</option>
        <option>Directeur d’Équipement</option>
        <option>Coordinateur Centres Sociaux Connectés</option>
      </optgroup>

      <optgroup label="Administratif & Support">
        <option>Secrétaire Accueil</option>
        <option>Assistant administratif</option>
        <option>Comptable</option>
      </optgroup>

      <optgroup label="Social & Animation">
        <option>Animateur</option>
        <option>Animateur ACM</option>
        <option>Médiateur</option>
        <option>Chargé d’insertion</option>
      </optgroup>

      <optgroup label="Numérique">
        <option>Médiateur numérique</option>
        <option>Chargé de transition numérique</option>
      </optgroup>

    </select>
  </div>

  <!-- OBJECTIF -->
  <div class="section">
    <h3>Objectif</h3>
    <input id="objectif" placeholder="Ex : organiser un atelier, créer une animation...">
  </div>

  
  <!-- CADRAGE -->
  <div class="section">
    <h3>⚙️ Cadrage</h3>
    <input id="contexte" placeholder="Contexte...">
    <input id="contraintes" placeholder="Contraintes...">

    <div class="choices" id="ton">
      <button onclick="select(this,'ton')">Professionnel</button>
      <button onclick="select(this,'ton')">Pédagogique</button>
      <button onclick="select(this,'ton')">Bienveillant</button>
      <button onclick="select(this,'ton')">Dynamique</button>
    </div>
  </div>

  <button class="generate" onclick="generer()">✨ Générer le prompt</button>

  <textarea id="resultat" placeholder="Ton prompt apparaîtra ici..."></textarea>

  <button class="copy" onclick="copier()">📋 Copier le prompt</button>

</main>

<footer>
  <h3>Partenaires</h3>
  <div class="logos">
    <img src="Bandeau financeur sans CSAT sans caf.png.png">
    <img src="Logo CSAT WS App.png">
    <img src="AMQR_logo-vignette.png">
    <img src="logo_acsrv_carre.png">    
    
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
