<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Croc V4</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img src="croc-2.png" class="logo">
  <h1>Croc Le Prompt</h1>
  <p class="subtitle">Assistant intelligent centres sociaux</p>
</header>

<main class="card">

  <div class="section">
    <h3>🎯 Public cible</h3>
    <input id="cible">
  </div>

  <div class="section">
    <h3>🎯 Objectif</h3>
    <input id="objectif">
  </div>

  <div class="section">
    <h3>👤 Rôle</h3>
    <select id="role" onchange="suggestions()">
      <option value="">-- Choisir --</option>
      <option>Animateur</option>
      <option>Coordinateur</option>
      <option>Directeur</option>
      <option>Médiateur numérique</option>
    </select>
  </div>

  <div id="suggestionsBox" class="suggestions"></div>

  <div class="section">
    <h3>⚙️ Cadrage</h3>
    <input id="contexte" placeholder="Contexte">
    <input id="contraintes" placeholder="Contraintes">
  </div>

  <button class="generate" onclick="generer()">✨ Générer</button>
  <button class="reset" onclick="reset()">♻️ Reset</button>

  <textarea id="resultat"></textarea>

  <button class="copy" onclick="copier()">📋 Copier</button>

  <h3>📜 Historique</h3>
  <div id="historique"></div>

</main>

<script src="script.js"></script>
</body>
</html>
