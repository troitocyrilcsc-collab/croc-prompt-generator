
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CROC LE PROMPT</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h1>CROC LE PROMPT</h1>
<p>Construisez votre prompt étape par étape</p>
</header>

<main>
<div class="container">

<div class="bloc">
<h2>1️⃣ Cadrage</h2>
<select id="cadrage">
<option value="">Choisir un contexte</option>
<option>Atelier pédagogique</option>
<option>Animation numérique</option>
<option>Création de contenu</option>
<option>Projet éducatif</option>
<option>Formation</option>
</select>
</div>

<div class="bloc">
<h2>2️⃣ Rôle</h2>
<select id="role">
<option value="">Choisir un rôle</option>
<option>Expert pédagogique</option>
<option>Animateur numérique</option>
<option>Concepteur de jeux</option>
<option>Rédacteur professionnel</option>
<option>Formateur</option>
</select>
</div>

<div class="bloc">
<h2>3️⃣ Objectif</h2>
<select id="objectif">
<option value="">Choisir un objectif</option>
<option>Créer un quiz</option>
<option>Expliquer un concept</option>
<option>Créer une activité</option>
<option>Rédiger un texte</option>
<option>Créer un jeu pédagogique</option>
</select>
</div>

<div class="bloc">
<h2>4️⃣ Cible</h2>
<select id="cible">
<option value="">Choisir une cible</option>
<option>Enfants</option>
<option>Collégiens</option>
<option>Lycéens</option>
<option>Adultes</option>
<option>Seniors</option>
</select>
</div>

<button onclick="genererPrompt()" class="generate">
Générer mon prompt
</button>

<div class="result">
<h2>Prompt généré</h2>
<pre id="resultat">Votre prompt apparaîtra ici</pre>
<button onclick="copierPrompt()" class="copy">Copier le prompt</button>
</div>

</div>
</main>

<footer>
CROC LE PROMPT • Générateur pédagogique
</footer>

<script src="script.js"></script>

</body>
</html>
