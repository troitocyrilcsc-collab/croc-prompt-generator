
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CROC LE PROMPT</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div class="header-inner">
<img src="logo.png" class="logo">
<div>
<h1>CROC LE PROMPT</h1>
<p>Construisez votre prompt avec la méthode CROC</p>
</div>
</div>
</header>

<nav class="topnav">
<ul>
<li>Accueil</li>
<li>Méthode CROC</li>
<li>Exemples</li>
<li>Aide</li>
</ul>
</nav>

<main>

<section class="builder">

<h2>Constructeur de Prompt</h2>

<div class="step">
<label>Cadrage</label>
<select id="cadrage">
<option value="">Choisir un contexte</option>
<option>Atelier pédagogique</option>
<option>Animation numérique</option>
<option>Formation professionnelle</option>
<option>Création de contenu</option>
<option>Projet éducatif</option>
</select>
</div>

<div class="step">
<label>Rôle de l'IA</label>
<select id="role">
<option value="">Choisir un rôle</option>
<option>Expert pédagogique</option>
<option>Animateur numérique</option>
<option>Professeur</option>
<option>Concepteur de jeu</option>
<option>Rédacteur professionnel</option>
</select>
</div>

<div class="step">
<label>Objectif</label>
<select id="objectif">
<option value="">Choisir un objectif</option>
<option>Créer un quiz</option>
<option>Créer une activité</option>
<option>Expliquer un concept</option>
<option>Créer un jeu pédagogique</option>
<option>Rédiger un texte</option>
</select>
</div>

<div class="step">
<label>Cible</label>
<select id="cible">
<option value="">Choisir une cible</option>
<option>Enfants</option>
<option>Collégiens</option>
<option>Lycéens</option>
<option>Adultes</option>
<option>Seniors</option>
</select>
</div>

<button onclick="genererPrompt()" class="btn-generate">
Générer le prompt
</button>

</section>

<section class="result">

<h2>Prompt généré</h2>

<pre id="resultat">
Votre prompt apparaîtra ici
</pre>

<button onclick="copierPrompt()" class="btn-copy">
Copier
</button>

</section>

</main>

<footer>

CROC LE PROMPT • Générateur pédagogique

</footer>

<script src="script.js"></script>

</body>
</html>
