
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CROC LE PROMPT - Générateur</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>
<body>

<header class="topbar">
<div class="logo-area">
<div class="logo-circle">🧠</div>
<span class="brand">CROC LE PROMPT</span>
</div>

<nav>
<a href="#">Accueil</a>
<a href="#">Générateur</a>
<a href="#">Exemples</a>
</nav>
</header>


<section class="hero">
<h1>Créer un prompt pédagogique puissant</h1>
<p>Construisez votre prompt étape par étape</p>
</section>


<main class="app">

<div class="grid">

<div class="card">
<h3>Contexte</h3>
<select id="cadrage"></select>
</div>

<div class="card">
<h3>Rôle</h3>
<select id="role"></select>
</div>

<div class="card">
<h3>Objectif</h3>
<select id="objectif"></select>
</div>

<div class="card">
<h3>Public cible</h3>
<select id="cible"></select>
</div>

</div>

<textarea id="details" placeholder="Ajouter des précisions..."></textarea>

<button onclick="genererPrompt()" class="generate">
✨ Générer mon prompt
</button>


<div class="result">
<h2>Prompt généré</h2>

<pre id="resultat">Votre prompt apparaîtra ici</pre>

<div class="actions">
<button onclick="copierPrompt()">Copier</button>
<button onclick="telechargerPrompt()">Télécharger</button>
</div>

</div>

</main>

<footer>
CROC LE PROMPT • Générateur pédagogique IA
</footer>

<script src="script.js"></script>

</body>
</html>
