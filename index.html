<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Croc Le Prompt</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <img src="logo.png" alt="Croc Le Prompt" class="logo">

  <div class="container">
    <h1>Générateur de Prompt</h1>

    <input type="text" id="role" placeholder="Rôle">
    <input type="text" id="objectif" placeholder="Objectif">
    <input type="text" id="contexte" placeholder="Contexte">
    <input type="text" id="contraintes" placeholder="Contraintes">
    <input type="text" id="ton" placeholder="Ton">

    <button onclick="generer()">Générer</button>

    <textarea id="resultat" placeholder="Votre prompt apparaîtra ici..."></textarea>
  </div>

  <footer class="partenaires">
    <h3>Nos partenaires</h3>
    <div class="logos-partenaires">
      <!-- Logos à venir -->
    </div>
  </footer>

<script src="script.js"></script>
</body>
</html>
