<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Croc Le Prompt</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="logo.png" class="logo">
  <h1>Croc Le Prompt</h1>
</header>

<main class="card">
  <h2>Générateur intelligent</h2>

  <div class="grid">
    <input id="role" placeholder="Rôle">
    <input id="objectif" placeholder="Objectif">
    <input id="contexte" placeholder="Contexte">
    <input id="contraintes" placeholder="Contraintes">
    <input id="ton" placeholder="Ton">
  </div>

  <button onclick="generer()">Générer le prompt</button>

  <textarea id="resultat" placeholder="Ton prompt apparaîtra ici..."></textarea>
</main>

<footer>
  <h3>Partenaires</h3>
  <div class="logos"></div>
</footer>

<script src="script.js"></script>
</body>
</html>
